services:
  blogfolio:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4321:4321"
    environment:
      - HOST=0.0.0.0
      - PORT=4321
    depends_on:
      - api

  api:
    build:
      context: ./api/SpacedRepetition.Api
      dockerfile: Dockerfile
    ports:
      - "5100:8080"
    environment:
      - ConnectionStrings__Default=Host=postgres;Database=spacedrepetition;Username=sr_user;Password=sr_pass
      - Keycloak__Authority=http://keycloak:8080/realms/blogfolio
      - Keycloak__Audience=blogfolio-api
      - Cors__AllowedOrigins=http://localhost:4321,https://maik-hasler.de
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: spacedrepetition
      POSTGRES_USER: sr_user
      POSTGRES_PASSWORD: sr_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sr_user -d spacedrepetition"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/spacedrepetition
      KC_DB_USERNAME: sr_user
      KC_DB_PASSWORD: sr_pass
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
